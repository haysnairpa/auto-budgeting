<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AutoBudget</title>

  <!-- PWA -->
  <link rel="manifest" href="/static/manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AutoBudget" />
  <link rel="apple-touch-icon" href="/static/icon-192.png" />
  <meta name="theme-color" content="#1d4ed8" />

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { -webkit-tap-highlight-color: transparent; }
    .safe-top    { padding-top:    env(safe-area-inset-top); }
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning { animation: spin 0.8s linear infinite; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

  <!-- ── Header ── -->
  <header class="bg-blue-700 text-white safe-top sticky top-0 z-10 shadow-md">
    <div class="flex items-center justify-between px-4 py-3 max-w-lg mx-auto">
      <div class="flex items-center gap-2">
        <span class="text-xl">💳</span>
        <h1 class="text-lg font-bold tracking-tight">AutoBudget</h1>
      </div>
      <button id="sync-btn" onclick="syncNow()"
        class="p-2 rounded-full hover:bg-blue-600 active:bg-blue-500 transition-colors">
        <svg id="sync-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ── Main ── -->
  <main class="max-w-lg mx-auto pb-8 safe-bottom">

    <!-- Loading -->
    <div id="view-loading" class="flex justify-center items-center py-32">
      <div class="w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full spinning"></div>
    </div>

    <!-- Not authenticated -->
    <div id="view-unauth" class="hidden px-4 py-8">
      <div class="bg-white rounded-2xl p-8 text-center shadow-sm">
        <div class="text-6xl mb-4">🔒</div>
        <h2 class="text-xl font-semibold text-gray-800 mb-2">Connect Your Gmail</h2>
        <p class="text-gray-500 text-sm mb-6 leading-relaxed">
          AutoBudget reads your BCA and GoPay notification emails to track
          your expenses automatically — zero manual input.
        </p>
        <a href="/auth/login"
          class="block w-full bg-blue-700 text-white py-3 px-6 rounded-xl font-semibold
                 hover:bg-blue-800 active:bg-blue-900 transition-colors text-center">
          Connect Gmail
        </a>
      </div>
    </div>

    <!-- Dashboard -->
    <div id="view-dashboard" class="hidden">

      <!-- Month summary card -->
      <div class="px-4 pt-4">
        <div class="bg-blue-700 text-white rounded-2xl p-5 shadow">
          <div class="flex justify-between items-start">
            <div>
              <p id="month-label" class="text-blue-200 text-xs font-medium uppercase tracking-wide">This Month</p>
              <p id="month-total" class="text-3xl font-bold mt-1">Rp0</p>
              <p id="month-count" class="text-blue-200 text-sm mt-1">0 transactions</p>
            </div>
            <button onclick="showMonthPicker()"
              class="text-blue-200 hover:text-white text-sm underline underline-offset-2">
              Change
            </button>
          </div>
          <!-- Per-bank pills -->
          <div id="bank-pills" class="flex gap-2 mt-3 flex-wrap"></div>
        </div>
      </div>

      <!-- Month picker (hidden by default) -->
      <div id="month-picker" class="hidden px-4 pt-3">
        <div class="bg-white rounded-xl p-3 shadow-sm flex gap-2">
          <select id="pick-month" class="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-700"></select>
          <select id="pick-year"  class="w-24 border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-700"></select>
          <button onclick="applyMonthFilter()"
            class="bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-800">
            Go
          </button>
        </div>
      </div>

      <!-- Transactions -->
      <div class="px-4 pt-4">
        <div class="flex justify-between items-center mb-2">
          <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Transactions</h2>
          <button onclick="logout()" class="text-xs text-gray-400 hover:text-red-500">Disconnect</button>
        </div>

        <div id="tx-list" class="space-y-2">
          <!-- filled by JS -->
        </div>

        <div id="tx-empty" class="hidden text-center py-12 text-gray-400">
          <div class="text-4xl mb-2">📭</div>
          <p class="text-sm">No transactions found</p>
        </div>

        <button id="load-more-btn" onclick="loadMore()"
          class="hidden w-full mt-4 py-3 text-sm text-blue-700 font-medium
                 bg-white rounded-xl shadow-sm hover:bg-blue-50 active:bg-blue-100 transition-colors">
          Load more
        </button>
      </div>
    </div>
  </main>

  <!-- Toast -->
  <div id="toast"
    class="hidden fixed bottom-6 inset-x-4 max-w-sm mx-auto
           bg-gray-800 text-white text-sm py-3 px-4 rounded-xl text-center z-50 shadow-lg">
  </div>

  <script>
    // ── State ──────────────────────────────────────────────────────────────
    const state = {
      month: new Date().getMonth() + 1,
      year:  new Date().getFullYear(),
      offset: 0,
      pageSize: 30,
    };

    // ── Helpers ────────────────────────────────────────────────────────────
    function fmt(amount) {
      return 'Rp' + Number(amount).toLocaleString('id-ID');
    }

    function fmtDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso.replace(' ', 'T'));
      return d.toLocaleDateString('id-ID', { day:'numeric', month:'short', year:'numeric' })
           + ' ' + d.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' });
    }

    function show(id)  { document.getElementById(id).classList.remove('hidden'); }
    function hide(id)  { document.getElementById(id).classList.add('hidden'); }

    function toast(msg, duration = 2500) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), duration);
    }

    const BANK_COLORS = {
      BCA:   'bg-blue-100 text-blue-700',
      GoPay: 'bg-green-100 text-green-700',
    };

    function bankBadge(bank) {
      const cls = BANK_COLORS[bank] || 'bg-gray-100 text-gray-600';
      return `<span class="text-xs font-medium px-2 py-0.5 rounded-full ${cls}">${bank}</span>`;
    }

    // ── Views ──────────────────────────────────────────────────────────────
    function showLoading()  { hide('view-unauth'); hide('view-dashboard'); show('view-loading'); }
    function showUnauth()   { hide('view-loading'); hide('view-dashboard'); show('view-unauth'); }
    function showDashboard(){ hide('view-loading'); hide('view-unauth'); show('view-dashboard'); }

    // ── Boot ───────────────────────────────────────────────────────────────
    async function boot() {
      showLoading();
      const res  = await fetch('/api/status');
      const data = await res.json();
      if (!data.authenticated) { showUnauth(); return; }
      showDashboard();
      buildMonthPicker();
      await Promise.all([loadStats(), loadTransactions(true)]);
    }

    // ── Stats ──────────────────────────────────────────────────────────────
    async function loadStats() {
      const res  = await fetch('/api/stats');
      const data = await res.json();
      const cm   = data.current_month;

      const d = new Date(state.year, state.month - 1);
      const label = d.toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });

      document.getElementById('month-label').textContent = label;
      document.getElementById('month-total').textContent = fmt(cm.total || 0);
      const c = cm.count || 0;
      document.getElementById('month-count').textContent = `${c} transaction${c !== 1 ? 's' : ''}`;

      const pills = document.getElementById('bank-pills');
      pills.innerHTML = (cm.by_bank || []).map(b =>
        `<span class="text-xs bg-blue-600 bg-opacity-50 text-blue-100 rounded-full px-3 py-1">
          ${b.bank} · ${fmt(b.total || 0)}
        </span>`
      ).join('');
    }

    // ── Transactions ───────────────────────────────────────────────────────
    async function loadTransactions(reset = false) {
      if (reset) {
        state.offset = 0;
        document.getElementById('tx-list').innerHTML = '';
      }

      const params = new URLSearchParams({
        limit:  state.pageSize,
        offset: state.offset,
        month:  state.month,
        year:   state.year,
      });

      const res  = await fetch(`/api/transactions?${params}`);
      const txs  = await res.json();

      const list = document.getElementById('tx-list');
      if (txs.length === 0 && state.offset === 0) {
        show('tx-empty'); hide('load-more-btn');
        return;
      }
      hide('tx-empty');

      txs.forEach(tx => {
        const card = document.createElement('div');
        card.className = 'bg-white rounded-xl shadow-sm p-4 flex items-start justify-between gap-3 active:bg-gray-50';
        card.innerHTML = `
          <div class="flex-1 min-w-0">
            <p class="font-semibold text-gray-800 truncate">${tx.merchant || '—'}</p>
            <p class="text-xs text-gray-400 mt-0.5">${fmtDate(tx.transaction_date)}</p>
            <div class="mt-1.5 flex gap-1.5 flex-wrap">
              ${bankBadge(tx.bank)}
              ${tx.transaction_type
                ? `<span class="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full">${tx.transaction_type}</span>`
                : ''}
            </div>
          </div>
          <p class="font-bold text-gray-900 text-right shrink-0 mt-0.5">${fmt(tx.amount)}</p>
        `;
        list.appendChild(card);
      });

      state.offset += txs.length;
      if (txs.length < state.pageSize) {
        hide('load-more-btn');
      } else {
        show('load-more-btn');
      }
    }

    function loadMore() { loadTransactions(false); }

    // ── Month picker ───────────────────────────────────────────────────────
    function buildMonthPicker() {
      const months = ['January','February','March','April','May','June',
                      'July','August','September','October','November','December'];
      const mSel = document.getElementById('pick-month');
      mSel.innerHTML = months.map((m, i) =>
        `<option value="${i+1}" ${i+1 === state.month ? 'selected' : ''}>${m}</option>`
      ).join('');

      const ySel = document.getElementById('pick-year');
      const cur  = new Date().getFullYear();
      for (let y = cur; y >= cur - 3; y--) {
        const opt = document.createElement('option');
        opt.value = y; opt.textContent = y;
        if (y === state.year) opt.selected = true;
        ySel.appendChild(opt);
      }
    }

    function showMonthPicker() {
      const p = document.getElementById('month-picker');
      p.classList.toggle('hidden');
    }

    async function applyMonthFilter() {
      state.month  = +document.getElementById('pick-month').value;
      state.year   = +document.getElementById('pick-year').value;
      hide('month-picker');
      await Promise.all([loadStats(), loadTransactions(true)]);
    }

    // ── Sync ───────────────────────────────────────────────────────────────
    async function syncNow() {
      const icon = document.getElementById('sync-icon');
      icon.classList.add('spinning');
      try {
        const res  = await fetch('/api/sync', { method: 'POST' });
        const data = await res.json();
        if (res.ok) {
          const n = data.new_transactions;
          toast(n > 0 ? `${n} new transaction${n > 1 ? 's' : ''} synced` : 'Already up to date');
          if (n > 0) await Promise.all([loadStats(), loadTransactions(true)]);
        } else {
          toast('Sync failed: ' + (data.detail || 'unknown error'));
        }
      } catch {
        toast('Network error');
      } finally {
        icon.classList.remove('spinning');
      }
    }

    // ── Logout ─────────────────────────────────────────────────────────────
    async function logout() {
      if (!confirm('Disconnect Gmail?')) return;
      window.location.href = '/auth/logout';
    }

    // ── PWA service worker ─────────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/static/sw.js').catch(() => {});
    }

    boot();
  </script>
</body>
</html>
